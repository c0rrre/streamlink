name: Docker Image CI

env:
  DH_USERNAME: ${{ secrets.DOCKER_USER }}
  DH_PASSWORD: ${{ secrets.DOCKER_TOKEN }}

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Login to Docker Hub
      uses: docker/login-action@v3.1.0
      with:
        username: ${{ env.DH_USERNAME }}
        password: ${{ env.DH_PASSWORD }}
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag c0rrre/streamlink:latest
      
    - name: Docker Push
      run: docker push c0rrre/streamlink

    - name: Docker Hub Description
      uses: peter-evans/dockerhub-description@v2
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        repository: c0rrre/streamlink
